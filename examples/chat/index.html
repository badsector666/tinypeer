<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Chat</title>
</head>
<body>
  <h1>Simple P2P Chat</h1>
  <div>
    <p>Your Peer ID: <strong id="peer-id">Connecting...</strong></p>
    <p>Username: <input type="text" id="username" placeholder="Your name" value="User" value="chat-"></p>
  </div>
  <div>
    <input type="text" id="remote-id" placeholder="Remote peer ID">
    <button id="connect-btn">Connect</button>
  </div>
  <div>
    <p>Status: <strong id="status">Not connected</strong></p>
  </div>
  <div>
    <h2>Chat</h2>
    <ul id="messages"></ul>
  </div>
  <div>
    <input type="text" id="message-input" placeholder="Type a message">
    <button id="send-btn">Send</button>
  </div>
  <script type="module" src="./chat.js"></script>
</body>
</html>
