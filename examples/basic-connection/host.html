<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Host - Basic Connection</title>
</head>
<body>
  <h1>Host</h1>
  <div>
    <p>Peer ID: <strong id="peer-id">Connecting...</strong></p>
  </div>
  <div>
    <h2>Connections</h2>
    <ul id="connections"></ul>
  </div>
  <div>
    <h2>Messages</h2>
    <ul id="messages"></ul>
  </div>
  <div>
    <input type="text" id="message-input" placeholder="Type a message">
    <button id="send-btn">Send to All</button>
  </div>
  <script type="module" src="./host.js"></script>
</body>
</html>
