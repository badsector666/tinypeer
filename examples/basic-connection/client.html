<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Client - Basic Connection</title>
</head>
<body>
  <h1>Client</h1>
  <div>
    <p>Your Peer ID: <strong id="peer-id">Connecting...</strong></p>
    <p>Connected to: <strong id="connected-to">Not connected</strong></p>
  </div>
  <div>
    <input type="text" id="host-id" placeholder="Paste host's peer ID here">
    <button id="connect-btn">Connect</button>
  </div>
  <div>
    <h2>Messages</h2>
    <ul id="messages"></ul>
  </div>
  <div>
    <input type="text" id="message-input" placeholder="Type a message">
    <button id="send-btn">Send</button>
  </div>
  <script type="module" src="./client.js"></script>
</body>
</html>
