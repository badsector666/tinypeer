<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Callee - Video Call</title>
</head>
<body>
  <h1>Callee</h1>
  <div>
    <p>Your Peer ID: <strong id="peer-id">Connecting...</strong></p>
    <p>Status: <strong id="status">Waiting for call...</strong></p>
  </div>
  <div>
    <h2>Local Video</h2>
    <video id="local-video" autoplay muted width="400"></video>
  </div>
  <div>
    <h2>Remote Video</h2>
    <video id="remote-video" autoplay width="400"></video>
  </div>
  <script type="module" src="./callee.js"></script>
</body>
</html>
