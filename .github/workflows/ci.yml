name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version 2>/dev/null || cat node_modules/playwright/package.json | bun -e "const p=await Bun.stdin.json();console.log(p.version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Format and Type check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Run unit tests
        run: bun run test:unit

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium firefox

      - name: Run integration tests in Chromium
        run: bun run test:chromium

      - name: Run integration tests in Firefox
        run: bun run test:firefox
