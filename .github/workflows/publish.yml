name: Publish Package

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install
      - name: Lint
        run: bun run check
      - name: Build
        run: bun run build
      - name: Test
        run: bun run test:unit
      - name: Publish
        run: bun publish
